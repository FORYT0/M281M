# M281M Configuration

exchange:
  name: binance
  testnet: true
  api_key: ""
  api_secret: ""

trading:
  symbols:
    - BTCUSDT
  timeframes:
    - 1m
    - 5m
  
data:
  websocket_reconnect_delay: 5
  max_reconnect_attempts: 10
  
features:
  order_flow_window: 100
  vpin_window: 50
  ema_periods: [9, 21]
  rsi_period: 14

risk:
  max_position_size: 0.1
  max_daily_drawdown: 0.05
  stop_loss_atr_multiplier: 2.0
  take_profit_ratio: 1.5

database:
  influxdb_url: "http://localhost:8086"
  influxdb_token: ""
  influxdb_org: "m281m"
  influxdb_bucket: "market_data"

logging:
  level: INFO
  file: logs/m281m.log
